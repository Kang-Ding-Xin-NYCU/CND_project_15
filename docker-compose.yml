services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3443:3443"
    volumes:
      - ./data:/app/data
      - ./certs:/certs:ro
    environment:
      PORT: 3443
      HTTPS: "true"
      TLS_KEY_FILE: /certs/localhost-key.pem
      TLS_CERT_FILE: /certs/localhost-cert.pem
      DATA_FILE: /app/data/lims-state.json
      JWT_SECRET: lims-demo-jwt-secret
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB_NAME: cloud_lims
      REDIS_URL: redis://redis:6379
    # Backend waits until MongoDB and Redis healthchecks pass. This controls
    # startup readiness; restart policies handle later process failures.
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/certs:ro
    environment:
      PORT: 8080
      HTTPS: "true"
      TLS_KEY_FILE: /certs/localhost-key.pem
      TLS_CERT_FILE: /certs/localhost-cert.pem
      API_BASE_URL: https://localhost:3443
    # Frontend waits for the backend healthcheck so the demo UI is served
    # after the API is ready.
    depends_on:
      backend:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mongo-data:
