services:
  backend:
    build:
      context: ./backend
    ports:
      - "3443:3443"
    volumes:
      - ./data:/app/data
      - ./certs:/certs:ro
    environment:
      PORT: 3443
      HTTPS: "true"
      TLS_KEY_FILE: /certs/localhost-key.pem
      TLS_CERT_FILE: /certs/localhost-cert.pem
      DATA_FILE: /app/data/lims-state.json
      JWT_SECRET: lims-demo-jwt-secret
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB_NAME: cloud_lims
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/certs:ro
    environment:
      PORT: 8080
      HTTPS: "true"
      TLS_KEY_FILE: /certs/localhost-key.pem
      TLS_CERT_FILE: /certs/localhost-cert.pem
      API_BASE_URL: https://localhost:3443
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
