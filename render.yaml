services:
  - type: web
    name: cloud-lims-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: HTTPS
        value: "false"
      - key: MONGO_DB_NAME
        value: cloud_lims
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
