apiVersion: v1
kind: ConfigMap
metadata:
  name: lims-backend-config
data:
  PORT: "3000"
  HTTPS: "false"
  DATA_FILE: /app/data/lims-state.json
  MONGO_URL: mongodb://mongo:27017
  MONGO_DB_NAME: cloud_lims
  REDIS_URL: redis://redis:6379
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lims-frontend-config
data:
  PORT: "8080"
  HTTPS: "false"
  API_BASE_URL: http://localhost:3000
